<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Daisy Printing ✿ Business Manager</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400;700&display=swap');
:root{
  --rose:#E8A4B0;--rose2:#D4849A;--rose3:#C4607A;
  --petal:#F7E8ED;--petal2:#F0D4DC;
  --lav:#C8B8D8;--lav-bg:#F0EAF7;
  --sage:#A8C4B4;--sage-bg:#EAF4EE;
  --peach:#F4C4A4;--peach-bg:#FEF4EC;
  --cream:#FDF8F5;--white:#FFFFFF;
  --text:#3D2C35;--text2:#7A6070;--text3:#B09AAA;
  --border:#EDD8E0;--border2:#E4C8D4;
  --shadow:rgba(212,132,154,.12);--shadow2:rgba(212,132,154,.22);
  --r:10px;--rl:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Lato','Georgia',sans-serif;background:var(--cream);color:var(--text);font-size:14px;line-height:1.6}
h1,h2,h3,.serif{font-family:'Playfair Display','Georgia',serif;font-weight:400}

/* APP SHELL */
#app{display:flex;height:100vh;overflow:hidden}
#sidebar{width:224px;background:linear-gradient(175deg,#F9EFF3,#F3E4EC,#EDD8E8);flex-shrink:0;display:flex;flex-direction:column;border-right:1px solid var(--border);overflow-y:auto}
#main{flex:1;overflow-y:auto;background:var(--cream)}

/* SIDEBAR */
.sb-brand{padding:20px 18px 16px;border-bottom:1px solid var(--border2);text-align:center}
.sb-logo{width:80px;height:80px;border-radius:50%;object-fit:cover;border:3px solid rgba(255,255,255,.6);box-shadow:0 4px 14px var(--shadow2);margin-bottom:8px}
.sb-brand h1{font-size:15px;color:var(--rose3);letter-spacing:.3px}
.sb-brand p{font-size:10px;color:var(--text3);margin-top:2px;text-transform:uppercase;letter-spacing:.6px}
.sb-sect{padding:14px 16px 4px;font-size:9px;font-weight:700;color:var(--text3);letter-spacing:1.8px;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;font-size:13px;color:var(--text2);border-left:3px solid transparent;border-radius:0 20px 20px 0;margin:2px 8px 2px 0;transition:all .15s}
.nav-item:hover{background:rgba(232,164,176,.15);color:var(--rose3)}
.nav-item.active{background:linear-gradient(90deg,rgba(232,164,176,.3),rgba(232,164,176,.1));color:var(--rose3);border-left-color:var(--rose2);font-weight:700}
.sb-foot{padding:12px;border-top:1px solid var(--border2);display:flex;flex-direction:column;gap:6px;margin-top:auto}
.sb-btn{width:100%;padding:8px;border-radius:20px;border:1px solid var(--border2);background:rgba(255,255,255,.6);color:var(--text2);font-size:11px;font-family:inherit;cursor:pointer;font-weight:700;letter-spacing:.4px;text-transform:uppercase;transition:all .15s}
.sb-btn:hover{background:var(--petal);color:var(--rose3);border-color:var(--rose)}
.sb-save-btn{background:linear-gradient(135deg,var(--rose2),var(--rose3))!important;color:#fff!important;border-color:transparent!important;margin-bottom:4px}
.sb-save-btn:hover{opacity:.88!important;background:linear-gradient(135deg,var(--rose2),var(--rose3))!important}
.saved-flash{text-align:center;font-size:11px;color:var(--sage);font-weight:700;display:none}
.saved-flash.show{display:block}
@keyframes fo{0%{opacity:1}70%{opacity:1}100%{opacity:0}}

/* TOPBAR */
.topbar{background:rgba(253,248,245,.96);border-bottom:1px solid var(--border);padding:14px 26px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:5}
.topbar h2{font-size:20px;color:var(--text)}
.topbar p{font-size:12px;color:var(--text3);margin-top:1px}
.tba{display:flex;gap:8px;align-items:center}
.content{padding:26px}

/* BUTTONS */
.btn{padding:8px 16px;border-radius:20px;border:none;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;letter-spacing:.5px;text-transform:uppercase;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.btn-p{background:linear-gradient(135deg,var(--rose2),var(--rose3));color:#fff;box-shadow:0 3px 12px var(--shadow2)}.btn-p:hover{transform:translateY(-1px)}
.btn-s{background:var(--white);color:var(--text2);border:1px solid var(--border2)}.btn-s:hover{background:var(--petal);color:var(--rose3)}
.btn-g{background:transparent;color:var(--text2);border:1px solid var(--border)}.btn-g:hover{background:var(--petal)}
.btn-d{background:var(--petal);color:var(--rose3);border:1px solid var(--border2)}.btn-d:hover{background:var(--petal2)}
.btn-sm{padding:5px 10px;font-size:11px}

/* CARDS / METRICS */
.card{background:var(--white);border-radius:16px;border:1px solid var(--border);padding:20px;box-shadow:0 2px 14px var(--shadow);margin-bottom:20px}
.grid{display:grid;gap:16px}
.grid-4{grid-template-columns:repeat(4,1fr)}
.grid-3{grid-template-columns:repeat(3,1fr)}
.grid-2{grid-template-columns:1fr 1fr}
.mc{background:var(--white);border-radius:14px;border:1px solid var(--border);padding:16px 18px;box-shadow:0 2px 14px var(--shadow)}
.mc-lbl{font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.7px}
.mc-val{font-size:24px;margin-top:4px;font-family:'Playfair Display','Georgia',serif;color:var(--text)}
.mc-val.pos{color:var(--rose3)}.mc-val.grn{color:#3A7A5A}
.mc-sub{font-size:11px;color:var(--text3);margin-top:2px}
.st{font-family:'Playfair Display','Georgia',serif;font-size:15px;margin-bottom:14px;color:var(--text)}

/* TABLES */
.tw{overflow-x:auto;border-radius:12px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead{background:var(--rose2)}
th{padding:11px 14px;text-align:left;font-weight:700;font-size:11px;color:#fff;border-bottom:none;white-space:nowrap;text-transform:uppercase;letter-spacing:.5px;cursor:default;background:var(--rose2)}
th.sort{cursor:pointer}
th.sort:hover{background:var(--rose3);color:#fff}
td{padding:10px 13px;border-bottom:1px solid var(--border);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--petal)}

/* BADGES */
.badge{display:inline-flex;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.3px;text-transform:uppercase}
.bg{background:var(--sage-bg);color:#3A7A5A}
.ba{background:var(--peach-bg);color:#905020}
.br{background:var(--petal2);color:var(--rose3)}
.bl{background:var(--lav-bg);color:var(--lav2);font-weight:700}
.tag{display:inline-block;background:var(--petal);color:var(--rose2);font-size:10px;padding:2px 8px;border-radius:12px;border:1px solid var(--border);font-weight:700;text-transform:uppercase;letter-spacing:.3px}

/* FORMS */
label{font-size:11px;font-weight:700;color:var(--text2);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
input,select,textarea{width:100%;padding:8px 11px;border:1.5px solid var(--border2);border-radius:9px;font-size:13px;font-family:inherit;background:var(--white);color:var(--text);outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--rose2);box-shadow:0 0 0 3px rgba(232,164,176,.18)}
input[type=checkbox]{width:auto;accent-color:var(--rose2)}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:4px;border-radius:4px;background:var(--petal2);outline:none;cursor:pointer;padding:0;border:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--rose2);cursor:pointer;border:2px solid white;box-shadow:0 1px 4px var(--shadow2)}
.fg{display:grid;gap:13px}.fg2{grid-template-columns:1fr 1fr}.fg3{grid-template-columns:1fr 1fr 1fr}.fg4{grid-template-columns:1fr 1fr 1fr auto}
.fgroup{margin-bottom:13px}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(61,44,53,.45);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(3px)}
.overlay.open{display:flex}
.modal{background:var(--cream);border-radius:20px;padding:26px;width:100%;max-width:580px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(61,44,53,.2);border:1px solid var(--border)}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.mh h3{font-size:18px}.xbtn{background:none;border:none;font-size:22px;cursor:pointer;color:var(--text3);line-height:1;padding:4px;border-radius:50%}.xbtn:hover{background:var(--petal);color:var(--rose3)}
.mf{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;padding-top:18px;border-top:1px solid var(--border)}

/* CHIPS */
.chip-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.chip{padding:4px 11px;border-radius:20px;border:1px solid var(--border2);background:var(--white);color:var(--text2);font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;font-family:inherit;letter-spacing:.3px;text-transform:uppercase}
.chip:hover{background:var(--petal);color:var(--rose3)}
.chip.on{background:linear-gradient(135deg,var(--rose2),var(--rose3));color:#fff;border-color:transparent}

/* FILTER PANEL */
.filter-panel{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:16px 18px;margin-bottom:18px}
.filter-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;font-weight:700;margin-bottom:6px}

/* QTY EDITOR */
.qty-edit{display:flex;align-items:center;gap:4px}
.qty-btn{width:24px;height:24px;border-radius:50%;border:1px solid var(--border2);background:var(--petal);color:var(--rose3);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;font-weight:700;flex-shrink:0;font-family:inherit}
.qty-btn:hover{background:var(--petal2)}
.num-sm{width:52px;text-align:center;padding:4px 6px;font-size:13px}

/* PRICE CELL */
.price-cell{min-width:148px}
.slider-wrap{display:flex;flex-direction:column;gap:3px}
.slider-row{display:flex;align-items:center;gap:5px}
.price-num{width:68px;padding:4px 8px;font-size:13px}

/* MARGIN BAR */
.margin-mini{display:flex;align-items:center;gap:6px}
.margin-trk{flex:1;background:var(--petal);border-radius:4px;height:6px;overflow:hidden;min-width:40px}
.margin-fill{height:100%;border-radius:4px}

/* INVOICE */
.inv{background:var(--white);border:1px solid var(--border);border-radius:18px;padding:36px;max-width:680px;box-shadow:0 4px 24px var(--shadow)}
.inv-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:28px}
.inv-logo-wrap{display:flex;align-items:center;gap:13px}
.inv-logo-img{width:64px;height:64px;border-radius:50%;object-fit:cover;border:2px solid var(--border)}
.inv-biz{font-family:'Playfair Display','Georgia',serif;font-size:22px;color:var(--rose3);font-style:italic}
.inv-biz small{display:block;font-family:'Lato','Georgia',sans-serif;font-size:11px;color:var(--text3);font-style:normal;font-weight:300;margin-top:2px}
.inv-meta{text-align:right;font-size:12px;line-height:1.9;color:var(--text2)}
.inv-num{font-family:'Playfair Display','Georgia',serif;font-size:17px;color:var(--text)}
.inv-to{background:var(--petal);border-radius:11px;padding:14px 18px;margin-bottom:22px;font-size:13px;line-height:1.8;border:1px solid var(--border)}
.inv-to strong{font-size:9px;text-transform:uppercase;letter-spacing:.9px;color:var(--text3);display:block;margin-bottom:3px;font-weight:700}
.inv-it th{background:var(--rose2);color:rgba(255,255,255,.9);border-bottom:none}
.inv-row{display:flex;justify-content:space-between;padding:4px 13px;font-size:13px;color:var(--text2)}
.inv-grand{background:linear-gradient(135deg,var(--rose2),var(--rose3));color:#fff;border-radius:11px;padding:11px 13px;display:flex;justify-content:space-between;font-size:15px;font-family:'Playfair Display','Georgia',serif;margin-top:7px}

/* CHARTS */
.bars{display:flex;flex-direction:column;gap:9px}
.bar-row{display:flex;align-items:center;gap:9px}
.bar-lbl{width:140px;font-size:11px;color:var(--text2);text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-trk{flex:1;background:var(--petal);border-radius:5px;height:18px;overflow:hidden}
.bar-fill{height:100%;border-radius:5px;transition:width .4s}
.bar-val{width:54px;font-size:11px;color:var(--text2);flex-shrink:0}
.donut-wrap{display:flex;gap:20px;align-items:center}
.donut-legend{display:flex;flex-direction:column;gap:7px;flex:1;min-width:0}
.donut-leg-row{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--text2)}
.donut-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* INSIGHT KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.kpi{background:var(--white);border:1px solid var(--border);border-radius:13px;padding:15px;text-align:center;box-shadow:0 2px 10px var(--shadow)}
.kpi.rose{border-color:var(--rose);background:linear-gradient(135deg,#fff,var(--petal))}
.kpi.sage{border-color:var(--sage);background:linear-gradient(135deg,#fff,var(--sage-bg))}
.kpi-val{font-family:'Playfair Display','Georgia',serif;font-size:21px;color:var(--text);margin:3px 0 2px}
.kpi.rose .kpi-val{color:var(--rose3)}.kpi.sage .kpi-val{color:#3A7A5A}
.kpi-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;font-weight:700}
.kpi-sub{font-size:11px;color:var(--text2);margin-top:2px}
.stat-pill{display:inline-flex;align-items:center;gap:5px;background:var(--petal);border:1px solid var(--border);border-radius:20px;padding:5px 13px;font-size:12px;color:var(--text2);font-weight:700;margin-bottom:8px}
.sp-val{font-family:'Playfair Display','Georgia',serif;font-size:15px;color:var(--rose3);margin:0 2px}
.pill-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}

/* DATE RANGE */
.date-range{display:flex;align-items:center;gap:8px;background:var(--white);border:1px solid var(--border2);border-radius:11px;padding:6px 13px}
.date-range label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;font-weight:700;white-space:nowrap;margin:0}
.date-range input{border:none;background:transparent;font-size:13px;color:var(--text);font-family:inherit;outline:none;padding:0;width:128px;box-shadow:none}
.date-sep{color:var(--text3);font-size:13px;flex-shrink:0}

/* ALERT */
.alert{background:var(--petal2);border:1px solid var(--border2);border-radius:11px;padding:11px 15px;margin-bottom:16px;font-size:13px;color:var(--rose3)}
.mcalc{border-radius:11px;padding:11px 13px;font-size:13px;margin-top:12px}
.mcalc-ok{background:var(--sage-bg);border:1px solid #b3dfc6;color:#2A6A4A}
.mcalc-warn{background:var(--peach-bg);border:1px solid #f0c8a0;color:#905020}
.mcalc-bad{background:var(--petal2);border:1px solid var(--border2);color:var(--rose3)}

@page{size:A4;margin:1.2cm}@media print{#sidebar,.topbar,.tba,.btn,.filter-panel{display:none!important}#main{overflow:visible}.content{padding:0}.inv{box-shadow:none;border:none;max-width:100%}}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:8px}

/* ── LOGIN SCREEN ── */
.login-wrap{position:fixed;inset:0;background:linear-gradient(135deg,#F9EFF3 0%,#F0E4EE 40%,#EAD8F0 100%);display:flex;align-items:center;justify-content:center;z-index:9999}
.login-card{background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:24px;padding:48px 44px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(196,96,122,.18);text-align:center}
.login-logo{width:100px;height:100px;border-radius:50%;object-fit:cover;border:3px solid rgba(255,255,255,.6);box-shadow:0 4px 16px rgba(196,96,122,.25);margin-bottom:16px}
.login-card h1{font-family:'Playfair Display','Georgia',serif;font-size:26px;color:var(--rose3);margin-bottom:4px}
.login-card p{font-size:13px;color:var(--text3);margin-bottom:32px;font-weight:300}
.login-field{text-align:left;margin-bottom:16px}
.login-field label{font-size:11px;font-weight:700;color:var(--text2);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.login-input-wrap{position:relative}
.login-field input{width:100%;padding:12px 44px 12px 16px;border:1.5px solid var(--border2);border-radius:12px;font-size:15px;font-family:inherit;background:rgba(255,255,255,.9);color:var(--text);outline:none;transition:all .2s;letter-spacing:.5px}
.login-field input:focus{border-color:var(--rose2);box-shadow:0 0 0 4px rgba(232,164,176,.18)}
.login-show{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text3);font-size:12px;font-family:inherit;font-weight:700;padding:4px 6px}
.login-show:hover{color:var(--rose2)}
.login-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--rose2),var(--rose3));color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;letter-spacing:.8px;text-transform:uppercase;margin-top:4px;box-shadow:0 4px 16px rgba(196,96,122,.3);transition:all .2s}
.login-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(196,96,122,.4)}
.login-error{background:var(--petal2);border:1px solid var(--border2);border-radius:10px;padding:10px 14px;font-size:13px;color:var(--rose3);margin-bottom:14px;animation:shake .3s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.login-hint{font-size:11px;color:var(--text3);margin-top:18px;font-style:italic}
</style>
</head>
<body>
<div id="app">
  <div id="sidebar"></div>
  <div id="main"></div>
</div>

<div id="inv-modal" class="overlay"></div>
<div id="item-modal" class="overlay"></div>

// Save all STATE data to Firestore
async function cloudSave(products, sales, inventory) {
  try {
    await DOC_REF.set({ products, sales, inventory, updated: new Date().toISOString() });
    return true;
  } catch(e) {
    console.error("Cloud save failed:", e);
    return false;
  }
}

// Load data from Firestore
async function cloudLoad() {
  try {
    const snap = await DOC_REF.get();
    if (snap.exists) return snap.data();
    return null;
  } catch(e) {
    console.error("Cloud load failed:", e);
    return null;
  }
}

let saveTimer = null;

function persist(key) {
  _unsaved = true;
  const el = document.getElementById("saved-flash");
  if(el){ el.textContent="● Saving..."; el.style.color="var(--rose3)"; el.classList.add("show"); }
  // Debounce cloud save — fires 1.5s after last change
  clearTimeout(_saveDebounce);
  _saveDebounce = setTimeout(async () => {
    const ok = await cloudSave(STATE.products, STATE.sales, STATE.inventory);
    if(ok) markSaved();
    else {
      const el2 = document.getElementById("saved-flash");
      if(el2){ el2.textContent="⚠ Save failed — check connection"; el2.style.color="var(--rose3)"; }
    }
  }, 1500);
}

  _unsaved = false;
  const el = document.getElementById("saved-flash");

}

function el(tag, attrs={}, ...children) {
  const e = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs)) {
    if (k === "cls") e.className = v;
    else if (k === "style" && typeof v === "object") Object.assign(e.style, v);
    else if (k.startsWith("on") && typeof v === "function") e.addEventListener(k.slice(2), v);
    else if (k === "html") { e.innerHTML = v; continue; }
    else if (v !== null && v !== undefined && v !== false) e.setAttribute(k, v);
  }
  for (const c of children.flat()) {
    if (c == null || c === false) continue;
    e.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  }
  return e;
}
const div = (cls, ...ch) => el("div", {cls}, ...ch);
const span = (cls, txt) => el("span", {cls}, txt);
const btn = (cls, txt, onclick) => el("button", {cls:`btn ${cls}`, onclick}, txt);
const lbl = txt => el("label", {}, txt);
const inp = (attrs) => el("input", attrs);

function frag(...ch) {
  const f = document.createDocumentFragment();
  ch.flat().filter(Boolean).forEach(c => f.appendChild(typeof c === "string" ? document.createTextNode(c) : c));
  return f;
}

function textInput(val, onchange, extra={}) {
  const i = inp({type:"text", value:val, ...extra});
  i.addEventListener("input", e => onchange(e.target.value));
  return i;
}
function numInput(val, onchange, extra={}) {
  const i = inp({type:"number", value:val, ...extra});
  i.addEventListener("input", e => onchange(Number(e.target.value)));
  return i;
}
function selectEl(options, value, onchange, extra={}) {
  const s = el("select", {...extra});
  options.forEach(([v,t]) => {
    const o = el("option", {value:v}, t||v);
    if (v === value) o.selected = true;
    s.appendChild(o);
  });
  s.addEventListener("change", e => onchange(e.target.value));
  return s;
}
function badge(cls, txt) { return el("span", {cls:`badge ${cls}`}, txt); }
function tagSpan(txt) { return el("span", {cls:"tag"}, txt); }

function donutChart(data, size=140) {
  const total = data.reduce((s,d)=>s+d.value,0);
  if (!total) return el("p",{style:{color:"var(--text3)",fontSize:"13px",fontStyle:"italic",padding:"20px 0"}},"No data yet");
  let angle = -Math.PI/2;
  const cx=size/2, cy=size/2, r=size/2-6, ir=r*0.55;
  const ns = "http://www.w3.org/2000/svg";
  const svg = document.createElementNS(ns,"svg");
  svg.setAttribute("width",size); svg.setAttribute("height",size); svg.style.flexShrink="0";
  data.forEach((d,i) => {
    const a = (d.value/total)*Math.PI*2;
    const x1=cx+r*Math.cos(angle), y1=cy+r*Math.sin(angle);
    const x2=cx+r*Math.cos(angle+a), y2=cy+r*Math.sin(angle+a);
    const ix1=cx+ir*Math.cos(angle), iy1=cy+ir*Math.sin(angle);
    const ix2=cx+ir*Math.cos(angle+a), iy2=cy+ir*Math.sin(angle+a);
    const large = a>Math.PI?1:0;
    const path = document.createElementNS(ns,"path");
    path.setAttribute("d",`M ${ix1} ${iy1} L ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} L ${ix2} ${iy2} A ${ir} ${ir} 0 ${large} 0 ${ix1} ${iy1} Z`);
    path.setAttribute("fill", CAT_COLORS[i%CAT_COLORS.length]);
    path.setAttribute("stroke","white"); path.setAttribute("stroke-width","2");
    svg.appendChild(path); angle+=a;
  });
  const hole = document.createElementNS(ns,"circle");
  hole.setAttribute("cx",cx); hole.setAttribute("cy",cy); hole.setAttribute("r",ir-2); hole.setAttribute("fill","white");
  svg.appendChild(hole);

  let angle2 = -Math.PI/2;
  const legend = div("donut-legend");
  data.forEach((d,i) => {
    const a=(d.value/total)*Math.PI*2;
    const row = div("donut-leg-row");
    const dot = div("donut-dot"); dot.style.background=CAT_COLORS[i%CAT_COLORS.length];
    const nameSp = el("span",{style:{flex:"1",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},d.label);
    const pctSp = el("span",{style:{fontWeight:"700",color:"var(--text)",flexShrink:"0"}},`${((d.value/total)*100).toFixed(1)}%`);
    row.append(dot,nameSp,pctSp); legend.appendChild(row); angle2+=a;
  });
  const wrap = div("donut-wrap"); wrap.append(svg,legend); return wrap;
}

function lineChart(data, color="#C8B8D8", height=120) {
  if (!data||data.length<2) return el("p",{style:{color:"var(--text3)",fontSize:"13px",textAlign:"center",padding:"30px 0"}},"Not enough data");
  const ns="http://www.w3.org/2000/svg";
  const svg=document.createElementNS(ns,"svg");
  const W=400,H=height,pt=10,pb=28,pl=40,pr=10;
  svg.setAttribute("viewBox",`0 0 ${W} ${H}`); svg.style.width="100%"; svg.style.height=height+"px";
  svg.setAttribute("preserveAspectRatio","none");
  const vals=data.map(d=>d.value), mn=Math.min(...vals), mx=Math.max(...vals), rng=mx-mn||1;
  const pts=data.map((d,i)=>({x:pl+(i/(data.length-1))*(W-pl-pr),y:H-pb-((d.value-mn)/rng)*(H-pt-pb),label:d.label,value:d.value}));
  const pathD=pts.map((p,i)=>(i===0?`M ${p.x} ${p.y}`:`L ${p.x} ${p.y}`)).join(" ");
  const areaD=`${pathD} L ${pts[pts.length-1].x} ${H-pb} L ${pts[0].x} ${H-pb} Z`;
  const defs=document.createElementNS(ns,"defs");
  const grad=document.createElementNS(ns,"linearGradient");
  grad.setAttribute("id","lg"); grad.setAttribute("x1","0"); grad.setAttribute("y1","0"); grad.setAttribute("x2","0"); grad.setAttribute("y2","1");
  const s1=document.createElementNS(ns,"stop"); s1.setAttribute("offset","0%"); s1.setAttribute("stop-color",color); s1.setAttribute("stop-opacity","0.28");
  const s2=document.createElementNS(ns,"stop"); s2.setAttribute("offset","100%"); s2.setAttribute("stop-color",color); s2.setAttribute("stop-opacity","0.02");
  grad.append(s1,s2); defs.appendChild(grad); svg.appendChild(defs);
  const area=document.createElementNS(ns,"path"); area.setAttribute("d",areaD); area.setAttribute("fill","url(#lg)"); svg.appendChild(area);
  const line=document.createElementNS(ns,"path"); line.setAttribute("d",pathD); line.setAttribute("fill","none"); line.setAttribute("stroke",color); line.setAttribute("stroke-width","2.5"); line.setAttribute("stroke-linecap","round"); line.setAttribute("stroke-linejoin","round"); svg.appendChild(line);
  pts.forEach(p=>{
    const c=document.createElementNS(ns,"circle"); c.setAttribute("cx",p.x); c.setAttribute("cy",p.y); c.setAttribute("r","4"); c.setAttribute("fill",color); c.setAttribute("stroke","white"); c.setAttribute("stroke-width","2"); svg.appendChild(c);
    const t=document.createElementNS(ns,"text"); t.setAttribute("x",p.x); t.setAttribute("y",H-4); t.setAttribute("text-anchor","middle"); t.setAttribute("font-size","9"); t.setAttribute("fill","#B09AAA"); t.textContent=p.label; svg.appendChild(t);
  });
  return svg;
}

function barChart(data, height=150) {
  if (!data||!data.length) return el("p",{style:{color:"var(--text3)",fontSize:"13px",textAlign:"center",padding:"30px 0"}},"No data");
  const ns="http://www.w3.org/2000/svg";
  const svg=document.createElementNS(ns,"svg");
  const W=400,H=height,pt=8,pb=26,pl=38,pr=8;
  svg.setAttribute("viewBox",`0 0 ${W} ${H}`); svg.style.width="100%"; svg.style.height=height+"px";
  svg.setAttribute("preserveAspectRatio","none");
  const maxV=Math.max(...data.flatMap(d=>[d.rev,Math.abs(d.profit)]),1);
  const bw=(W-pl-pr)/data.length, gap=3, barW=(bw-gap*3)/2;
  [0,.25,.5,.75,1].forEach(t=>{ const g=document.createElementNS(ns,"line"); const y=pt+(1-t)*(H-pt-pb); g.setAttribute("x1",pl); g.setAttribute("y1",y); g.setAttribute("x2",W-pr); g.setAttribute("y2",y); g.setAttribute("stroke","#EDD8E0"); g.setAttribute("stroke-width","0.8"); svg.appendChild(g); });
  data.forEach((d,i)=>{
    const x=pl+i*bw+gap;
    const rh=(d.rev/maxV)*(H-pt-pb); const ph=(Math.abs(d.profit)/maxV)*(H-pt-pb);

function doExport() {
  const data={products:STATE.products,sales:STATE.sales,inventory:STATE.inventory,exported:new Date().toISOString()};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});

  a.download="daisy-backup-"+new Date().toISOString().split("T")[0]+".json"; a.click();
}

function saveFile(){
  const now=new Date();
  const day=now.getDate();
  const months=["January","February","March","April","May","June","July","August","September","October","November","December"];
  const mon=months[now.getMonth()];
  const hh=String(now.getHours()).padStart(2,"0");
  const mm=String(now.getMinutes()).padStart(2,"0");
  const filename="Business Tracker "+day+" "+mon+" "+hh+":"+mm+".html";

  const payload=JSON.stringify({products:STATE.products,sales:STATE.sales,inventory:STATE.inventory});
  // Use a stable split: find id="appdata"> then next < to replace only the data content
  const full=document.documentElement.outerHTML;
  const OPEN='id="appdata">';
  const CLOSE='<\/textarea>';
  const si=full.indexOf(OPEN)+OPEN.length;
  const ei=full.indexOf("</textarea>",si);
  if(si<OPEN.length||ei<0){alert("Save failed — please try again.");return;}
  const html=full.slice(0,si)+payload+full.slice(ei);
  const blob=new Blob([html],{type:"text/html"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=filename;
  a.click();
  markSaved();
}
function doImport() {
  const i=document.createElement("input"); i.type="file"; i.accept=".json";
  i.onchange=e=>{
    const f=e.target.files[0]; if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(confirm("Replace ALL current data with this backup?")){
          if(d.products){STATE.products=d.products;}
          if(d.sales){STATE.sales=d.sales;}
          if(d.inventory){STATE.inventory=d.inventory;}
          // Push imported data to Firebase
          cloudSave(STATE.products, STATE.sales, STATE.inventory).then(()=>{
            render();
          });
        }
      }catch{alert("Invalid backup file.");}
    }; r.readAsText(f);
  }; i.click();
}

function renderInventory() {
  const inv=STATE.inventory;
  const cats=["All",...[...new Set(inv.map(i=>i.category))].sort()];
  const totalVal=inv.reduce((s,i)=>s+i.qty*i.cost,0);
  const lowCount=inv.filter(i=>i.qty<=3).length;

  let fil=inv
    .filter(i=>STATE.invCatFil==="All"||i.category===STATE.invCatFil)
    .filter(i=>STATE.invStockFil==="low"?i.qty<=3:STATE.invStockFil==="out"?i.qty===0:STATE.invStockFil==="ok"?i.qty>3:true)
    .filter(i=>!STATE.invSearch2||i.name.toLowerCase().includes(STATE.invSearch2.toLowerCase())||i.category.toLowerCase().includes(STATE.invSearch2.toLowerCase()));
  fil.sort((a,b)=>{
    let av=STATE.invSort==="value"?a.qty*a.cost:a[STATE.invSort]??0;
    let bv=STATE.invSort==="value"?b.qty*b.cost:b[STATE.invSort]??0;
    if(typeof av==="string")return STATE.invSortDir==="asc"?av.localeCompare(bv):bv.localeCompare(av);
    return STATE.invSortDir==="asc"?av-bv:bv-av;
  });

  const content=div("content");
  content.appendChild(div("grid grid-3",mc("Items tracked",String(inv.length),"unique stock items"),mc("Total units",String(inv.reduce((s,i)=>s+i.qty,0)),"across all items"),mc("Stock value",Rs(totalVal),"at cost price")));

  const fp=div("filter-panel");
  const sr=div("",el("div",{style:{display:"flex",gap:"10px",marginBottom:"12px",flexWrap:"wrap",alignItems:"center"}}));
  const si=textInput(STATE.invSearch2,v=>{STATE.invSearch2=v;renderPage();},{placeholder:"Search items...",style:"width:220px"});
  si.value=STATE.invSearch2;
  sr.firstChild.append(si,el("span",{style:{fontSize:"11px",color:"var(--text3)",fontStyle:"italic"}},`${fil.length} of ${inv.length} items`));
  fp.appendChild(sr);
  const cr1=div(""); cr1.appendChild(div("filter-lbl","Category"));
  const chips1=div("chip-row"); cats.forEach(c=>{const ch=el("button",{cls:`chip${STATE.invCatFil===c?" on":""}`,onclick:()=>{STATE.invCatFil=c;renderPage();}},c);chips1.appendChild(ch);});
  cr1.appendChild(chips1); fp.appendChild(cr1);
  const cr2=div(""); cr2.appendChild(div("filter-lbl","Stock level"));
  const chips2=div("chip-row");
  [["all","All"],["low","Low (≤3)"],["out","Out of stock"],["ok","In stock"]].forEach(([v,l])=>{const ch=el("button",{cls:`chip${STATE.invStockFil===v?" on":""}`,onclick:()=>{STATE.invStockFil=v;renderPage();}},l);chips2.appendChild(ch);});
  cr2.appendChild(chips2); fp.appendChild(cr2);
  content.appendChild(fp);

  function sortBy(key) { if(STATE.invSort===key)STATE.invSortDir=STATE.invSortDir==="asc"?"desc":"asc"; else{STATE.invSort=key;STATE.invSortDir="asc";} renderPage(); }
  function sh(key,label) {
    const active = STATE.invSort===key;
    const arrow  = active ? (STATE.invSortDir==="asc" ? " ↑" : " ↓") : "";
    const th = el("th",{cls:"sort"},label+arrow);
    th.addEventListener("click",()=>sortBy(key));
    return th;
  }

  const tw=div("tw"); const tbl=el("table");
  const thead=el("thead",{},(()=>{const tr=el("tr");tr.append(sh("name","Item name"),sh("category","Category"),sh("qty","Qty in stock"),sh("cost","Unit cost"),sh("value","Total value"),el("th",{},"Supplier"),el("th",{style:{textAlign:"center"}},"Order paid"),el("th",{},"Notes"),el("th",{},"Actions"));return tr;})());
  const tbody=el("tbody");
  fil.forEach(item=>{
    const tr=el("tr");
    const qtyEdit=div("qty-edit");
    const minusBtn=el("button",{cls:"qty-btn",onclick:()=>{item.qty=Math.max(0,item.qty-1);STATE.inventory=STATE.inventory.map(i=>i.id===item.id?{...item}:i);persist(SK.i);renderPage();}},"−");
    const qtyIn=numInput(item.qty,v=>{item.qty=Math.max(0,v);STATE.inventory=STATE.inventory.map(i=>i.id===item.id?{...item}:i);persist(SK.i);refreshInventoryStats();},{style:"width:52px;text-align:center;padding:4px 6px",min:"0"});
    const plusBtn=el("button",{cls:"qty-btn",onclick:()=>{item.qty++;STATE.inventory=STATE.inventory.map(i=>i.id===item.id?{...item}:i);persist(SK.i);renderPage();}},"＋");
    const stBadge=badge(sbq(item.qty),item.qty<=2?"Low":item.qty<=5?"Watch":"OK");
    qtyEdit.append(minusBtn,qtyIn,plusBtn,stBadge);
    const actions=div("");
    actions.append(btn("btn-s btn-sm","Edit",()=>openItemModal(item))," ",btn("btn-d btn-sm","✕",()=>{if(confirm(`Delete "${item.name}"?`)){STATE.inventory=STATE.inventory.filter(i=>i.id!==item.id);persist(SK.i);renderPage();}}));
    // Supplier inline edit
    const supplierInput=el("input",{type:"text",value:item.supplier||"",placeholder:"Supplier name",style:"width:120px;padding:4px 8px;font-size:12px;border:1.5px solid var(--border2);border-radius:7px;background:var(--white)"});
    let _supTimer=null;
    supplierInput.addEventListener("input",e=>{
      item.supplier=e.target.value;
      STATE.inventory=STATE.inventory.map(i=>i.id===item.id?{...item}:i);
      persist(SK.i);
      clearTimeout(_supTimer);
      _supTimer=setTimeout(()=>refreshInventoryStats(),400);
    });
    supplierInput.addEventListener("change",e=>{
      item.supplier=e.target.value;
      STATE.inventory=STATE.inventory.map(i=>i.id===item.id?{...item}:i);
      persist(SK.i);
      refreshInventoryStats();
    });
    // Order paid checkbox
    const paidCb=el("input",{type:"checkbox",style:"width:18px;height:18px;accent-color:var(--rose2);cursor:pointer"});
    if(item.orderPaid)paidCb.checked=true;
    paidCb.addEventListener("change",e=>{item.orderPaid=e.target.checked;STATE.inventory=STATE.inventory.map(i=>i.id===item.id?{...item}:i);persist(SK.i);refreshInventoryStats();});
    const paidCell=el("td",{style:{textAlign:"center"}},paidCb);
    tr.append(el("td",{},el("strong",{},item.name)),el("td",{},tagSpan(item.category)),el("td",{},qtyEdit),el("td",{},R2(item.cost)),el("td",{style:{fontWeight:"700"}},R2(item.qty*item.cost)),el("td",{},supplierInput),paidCell,el("td",{style:{color:"var(--text3)",fontSize:"12px",fontStyle:"italic",maxWidth:"140px"}},item.notes||""),el("td",{style:{whiteSpace:"nowrap"}},actions));
    tbody.appendChild(tr);
  });
  tbl.append(thead,tbody); tw.appendChild(tbl); content.appendChild(tw);


  // ── SUPPLIER INSIGHTS ─────────────────────────────────────
  const supplierData = {};
  STATE.inventory.forEach(item => {
    const sup = (item.supplier||"").trim() || "Unknown supplier";
    if(!supplierData[sup]) supplierData[sup] = {spend:0, stockVal:0, items:[], outstanding:[]};
    supplierData[sup].spend    += item.qty * item.cost;
    supplierData[sup].stockVal += item.qty * item.cost;
    supplierData[sup].items.push(item);
    if(!item.orderPaid) supplierData[sup].outstanding.push(item);
  });
  const suppliers = Object.entries(supplierData).sort((a,b)=>b[1].spend-a[1].spend);
  const maxSpend  = suppliers[0] ? suppliers[0][1].spend : 1;
  const totalOutstanding = STATE.inventory.filter(i=>!i.orderPaid).reduce((s,i)=>s+i.qty*i.cost,0);
  const suppliersWithDebt = suppliers.filter(([,d])=>d.outstanding.length>0).length;
  if(suppliers.length > 0) content.appendChild(buildSupplierCard(suppliers, maxSpend, totalOutstanding, suppliersWithDebt));
  return content;
}

function showEmailModal(inv) {
  if(!inv.email){
    // No email on record — prompt to enter one
    const entered = prompt("No email address on this record. Enter customer email to send:");
    if(!entered||!entered.includes("@")) return;
    STATE.sales = STATE.sales.map(x=>x.id===inv.id?{...x,email:entered}:x);
    persist(SK.s);
    inv = STATE.sales.find(x=>x.id===inv.id);
  }

  const m = document.getElementById("item-modal");
  m.innerHTML = ""; m.className = "overlay open";
  const isQ = inv.type === "quote";
  const modal = div("modal");
  const mh = div("mh",
    el("h3",{}, (isQ?"Send Quote":"Send Invoice") + " · " + inv.orderId),
    el("button",{cls:"xbtn",onclick:()=>{m.className="overlay";}},"×")
  );

  const preview = div("");
  preview.style.cssText = "background:var(--petal);border-radius:11px;padding:14px 18px;margin-bottom:16px;font-size:13px;line-height:1.8;color:var(--text2)";
  const sub = tRev(inv.items), vat = inv.vatIncl?sub*.15:0, tot = sub+vat;
  preview.innerHTML = `<strong style="color:var(--text)">${inv.customer}</strong><br>
    <span style="color:var(--text3);font-size:11px">TO:</span> ${inv.email}<br>
    <span style="color:var(--text3);font-size:11px">AMOUNT:</span> R ${tot.toFixed(2)}<br>
    <span style="color:var(--text3);font-size:11px">ITEMS:</span> ${inv.items.length} item${inv.items.length!==1?"s":""}`;

  const msgGrp = div("fgroup"); msgGrp.appendChild(lbl("Personal message (optional)"));
  const msgTa = el("textarea",{rows:"3",placeholder:"e.g. Hi! Please find your invoice attached. Let me know if you have any questions ✿"},
    isQ ? "Hi "+inv.customer+"! Please find your quote from Daisy Printing below. This is valid for 30 days — feel free to reply with any questions ✿"
        : "Hi "+inv.customer+"! Thank you for your order. Please find your invoice from Daisy Printing below ✿");
  msgGrp.appendChild(msgTa);

  const statusDiv = div(""); statusDiv.style.cssText = "font-size:13px;text-align:center;min-height:20px;margin-top:8px";

  const mf = div("mf",
    btn("btn-g","Cancel",()=>{m.className="overlay";}),
    btn("btn-p","✉ Send now", async()=>{
      const sendBtn = mf.querySelector(".btn-p");
      sendBtn.textContent = "Sending..."; sendBtn.disabled = true;
      // Update message in inv copy
      const invCopy = {...inv, email: inv.email};
      // Override message with textarea value
      const sub2=tRev(invCopy.items),vat2=invCopy.vatIncl?sub2*.15:0,tot2=sub2+vat2;
      const itemsHtml=invCopy.items.map(i=>`<tr style="border-bottom:1px solid #EDD8E0"><td style="padding:9px 13px;font-size:13px;color:#3D2C35">${i.product||"—"}</td><td style="padding:9px 13px;font-size:13px;color:#3D2C35;text-align:center">${i.qty}</td><td style="padding:9px 13px;font-size:13px;font-weight:700;color:#3D2C35;text-align:right">R ${(i.qty*i.price).toFixed(2)}</td></tr>`).join("");
      try {
        await emailjs.send("service_enqxkfu","template_ll2ranr",{
          to_email:   invCopy.email,
          to_name:    invCopy.customer||"Valued Customer",
          doc_type:   isQ?"Quote":"Invoice",
          order_id:   invCopy.orderId||"—",
          date:       invCopy.date||"—",
          amount:     "R "+tot2.toFixed(2),
          payment:    isQ?"Quote — Valid for 30 days":(invCopy.payment||"—"),
          items_html: itemsHtml,
          message:    msgTa.value,
        });
        statusDiv.innerHTML = "<span style='color:#3A7A5A;font-weight:700'>✓ Email sent successfully!</span>";
        sendBtn.textContent = "✓ Sent"; sendBtn.disabled = true;
        // Record that email was sent
        STATE.sales=STATE.sales.map(x=>x.id===inv.id?{...x,emailedAt:new Date().toISOString()}:x);
        persist(SK.s);
      } catch(e) {
        statusDiv.innerHTML = "<span style='color:var(--rose3);font-weight:700'>⚠ Send failed — check email address and try again</span>";
        sendBtn.textContent = "✉ Send now"; sendBtn.disabled = false;
      }
    })
  );
  modal.append(mh, preview, msgGrp, statusDiv, mf);
  m.appendChild(modal);
  m.addEventListener("click",e=>{if(e.target===m)m.className="overlay";});
}

function renderPricing() {
  const prods=STATE.products;
  const cats=["All",...[...new Set(prods.map(p=>p.cat))].sort()];
  let fil=prods
    .filter(p=>STATE.prCat==="All"||p.cat===STATE.prCat)
    .filter(p=>!STATE.prSearch||p.name.toLowerCase().includes(STATE.prSearch.toLowerCase()))
    .filter(p=>{const m=mPct(p.cost,p.sell);return STATE.prMarginFil==="good"?m>=40:STATE.prMarginFil==="ok"?m>=20&&m<40:STATE.prMarginFil==="low"?m<20:true;});
  fil.sort((a,b)=>{
    let av,bv;
    if(STATE.prSort==="name"||STATE.prSort==="cat"){av=a[STATE.prSort];bv=b[STATE.prSort];return STATE.prSortDir==="asc"?av.localeCompare(bv):bv.localeCompare(av);}
    av=STATE.prSort==="margin"?mPct(a.cost,a.sell):STATE.prSort==="profit"?a.sell-a.cost:a[STATE.prSort]??0;
    bv=STATE.prSort==="margin"?mPct(b.cost,b.sell):STATE.prSort==="profit"?b.sell-b.cost:b[STATE.prSort]??0;
    return STATE.prSortDir==="asc"?av-bv:bv-av;
  });

  const content=div("content");
  const fp=div("filter-panel");
  const sr=div("",el("div",{style:{display:"flex",gap:"10px",marginBottom:"12px",flexWrap:"wrap",alignItems:"center"}}));
  const si=textInput(STATE.prSearch,v=>{STATE.prSearch=v;renderPage();},{placeholder:"Search products...",style:"width:220px"});
  const sc=selectEl(cats.map(c=>[c,c]),STATE.prCat,v=>{STATE.prCat=v;renderPage();},{style:"width:150px"});
  sr.firstChild.append(si,sc,el("span",{style:{fontSize:"11px",color:"var(--text3)",fontStyle:"italic"}},`${fil.length} shown`));
  fp.appendChild(sr);
  const cr=div(""); cr.appendChild(div("filter-lbl","Filter by margin"));
  const chips=div("chip-row");
  [["all","All"],["good","✿ Good (≥40%)"],["ok","Fair (20–40%)"],["low","Needs review (<20%)"]].forEach(([v,l])=>{chips.appendChild(el("button",{cls:`chip${STATE.prMarginFil===v?" on":""}`,onclick:()=>{STATE.prMarginFil=v;renderPage();}},l));});
  cr.appendChild(chips); fp.appendChild(cr); content.appendChild(fp);

  function sortBy(key){if(STATE.prSort===key)STATE.prSortDir=STATE.prSortDir==="asc"?"desc":"asc";else{STATE.prSort=key;STATE.prSortDir="asc";}renderPage();}
  function sh(key,label){
    const active=STATE.prSort===key;
    const arrow=active?(STATE.prSortDir==="asc"?" ↑":" ↓"):"";
    const th=el("th",{cls:"sort"},label+arrow);
    th.addEventListener("click",()=>sortBy(key));
    return th;
  }

  const tw=div("tw");const tbl=el("table");
  const thead=el("thead",{},(()=>{const tr=el("tr");tr.append(sh("name","Product name"),sh("cat","Category"),el("th",{},"Cost price (R)"),el("th",{},"Sell price (R)"),sh("margin","Margin %"),sh("profit","Profit / unit"),sh("stock","Stock qty"),el("th",{},"Actions"));return tr;})());
  const tbody=el("tbody");
  fil.forEach(p=>{
    const m=mPct(p.cost,p.sell),profit=p.sell-p.cost;
    const maxSell=Math.max(p.cost*3,500);
    const tr=el("tr");
    let _prodTimer=null;
    function updProd(field,val){
      STATE.products=STATE.products.map(x=>x.id===p.id?{...x,[field]:val}:x);
      p[field]=val;
      persist(SK.p);
      // Debounced cross-page refresh so dashboard/insights stay current
      clearTimeout(_prodTimer);
      _prodTimer=setTimeout(()=>{
        renderPage(); // always refresh - 800ms debounce means sliders are no longer active
      },800);
    }

    // Cost cell with slider
    const costCell=el("td",{cls:"price-cell"});
    const costSlider=div("slider-wrap");
    const costRow=div("slider-row");
    const costNum=numInput(p.cost,v=>{updProd("cost",v);tr.querySelectorAll(".live-margin")[0]?.remove();updateLiveMargin(tr,p);},{step:"0.01",cls:"price-num"});
    const costRangeWrap=inp({type:"range",min:"1",max:String(Math.max(p.cost*2,200)),step:"0.5",value:String(p.cost)});
    costRangeWrap.addEventListener("input",e=>{const v=Number(e.target.value);costNum.value=v;updProd("cost",v);updateLiveMargin(tr,p);});
    costRow.append(costNum,el("span",{style:{fontSize:"11px",color:"var(--text3)"}},"R"));
    costSlider.append(costRow,costRangeWrap); costCell.appendChild(costSlider);

    // Sell cell with slider
    const sellCell=el("td",{cls:"price-cell"});
    const sellSlider=div("slider-wrap");
    const sellRow=div("slider-row");
    const sellNum=numInput(p.sell,v=>{updProd("sell",v);updateLiveMargin(tr,p);},{step:"0.01",cls:"price-num"});
    const sellRange=inp({type:"range",min:String(p.cost||1),max:String(maxSell),step:"0.5",value:String(p.sell)});
    sellRange.addEventListener("input",e=>{const v=Number(e.target.value);sellNum.value=v;updProd("sell",v);updateLiveMargin(tr,p);});
    sellRow.append(sellNum,el("span",{style:{fontSize:"11px",color:"var(--text3)"}},"R"));
    sellSlider.append(sellRow,sellRange); sellCell.appendChild(sellSlider);

    // Margin cell
    const marginCell=el("td",{cls:"live-margin-cell"});
    const marginMini=div("margin-mini");
    const mbadge=badge(bc(m),pct(m)); mbadge.className=`badge ${bc(m)} live-margin-badge`;
    const mtrk=div("margin-trk");const mfill=div("margin-fill");
    mfill.style.width=`${Math.min(100,m)}%`;mfill.style.background=m>=40?"#A8C4B4":m>=20?"#F4C4A4":"#E8A4B0";
    mtrk.appendChild(mfill); marginMini.append(mbadge,mtrk); marginCell.appendChild(marginMini);

    // Stock qty editor
    const stockCell=el("td");
    const qe=div("qty-edit");
    const mn=el("button",{cls:"qty-btn"},"\u2212");mn.onclick=()=>{updProd("stock",Math.max(0,p.stock-1));stockIn.value=p.stock;};
    const stockIn=numInput(p.stock,v=>updProd("stock",Math.max(0,v)),{style:"width:48px;text-align:center;padding:4px 6px",min:"0"});
    const pl2=el("button",{cls:"qty-btn"},"+");pl2.onclick=()=>{updProd("stock",p.stock+1);stockIn.value=p.stock;};
    qe.append(mn,stockIn,pl2); stockCell.appendChild(qe);

    const delCell=el("td",{},btn("btn-d btn-sm","✕",()=>{if(confirm(`Delete "${p.name}"?`)){STATE.products=STATE.products.filter(x=>x.id!==p.id);persist(SK.p);renderPage();}}));

    tr.append(el("td",{},el("strong",{},p.name)),el("td",{},tagSpan(p.cat)),costCell,sellCell,marginCell,el("td",{style:{fontWeight:"700",color:profit>=0?"#3A7A5A":"var(--rose3)"}},R2(profit)),stockCell,delCell);
    tbody.appendChild(tr);
  });
  tbl.append(thead,tbody); tw.appendChild(tbl); content.appendChild(tw);
  return content;
}

function refreshInventoryStats() {
  // Re-render the supplier insights card in place without rebuilding the whole table
  const inv = STATE.inventory;

  // Update the 3 top inventory KPI cards (items, units, value)
  const totalVal = inv.reduce((s,i)=>s+i.qty*i.cost,0);
  const kpiGrid = document.getElementById("inv-kpi");
  if(kpiGrid){
    const vals = kpiGrid.querySelectorAll(".mc-val");
    if(vals[0]) vals[0].textContent = String(inv.length);
    if(vals[1]) vals[1].textContent = String(inv.reduce((s,i)=>s+i.qty,0));
    if(vals[2]) vals[2].textContent = Rs(totalVal);
  }

  // Re-render the whole supplier section by replacing it
  const existing = document.getElementById('supplier-insights');
  if(!existing) return;
  const parent = existing.parentNode;

  // Build fresh supplier data
  const supplierData = {};
  inv.forEach(item => {
    const sup = (item.supplier||"").trim() || "Unknown supplier";
    if(!supplierData[sup]) supplierData[sup] = {spend:0, stockVal:0, items:[], outstanding:[]};
    supplierData[sup].spend    += item.qty * item.cost;
    supplierData[sup].stockVal += item.qty * item.cost;
    supplierData[sup].items.push(item);
    if(!item.orderPaid) supplierData[sup].outstanding.push(item);
  });

  const suppliers = Object.entries(supplierData).sort((a,b)=>b[1].spend-a[1].spend);
  const maxSpend  = suppliers[0] ? suppliers[0][1].spend : 1;
  const totalOutstanding = inv.filter(i=>!i.orderPaid).reduce((s,i)=>s+i.qty*i.cost,0);
  const suppliersWithDebt = suppliers.filter(([,d])=>d.outstanding.length>0).length;

  const sc = buildSupplierCard(suppliers, maxSpend, totalOutstanding, suppliersWithDebt);
  parent.replaceChild(sc, existing);
}

function buildSupplierCard(suppliers, maxSpend, totalOutstanding, suppliersWithDebt) {
  const sc = div("card"); sc.id = "supplier-insights";
  sc.style.marginTop = "24px";
  sc.appendChild(el("div",{cls:"st"},"✿ Supplier insights"));

  const kRow = div("grid grid-3"); kRow.id="inv-kpi"; kRow.style.marginBottom="18px";
  [
    ["Suppliers tracked", String(suppliers.length), "with stock items"],
    ["Total stock spend",  Rs(suppliers.reduce((s,[,d])=>s+d.spend,0)), "at cost price"],

    otb.appendChild(totalRow);

}

function updateLiveMargin(tr,p){
  const cell=tr.querySelector(".live-margin-cell");
  if(!cell)return;
  const m=mPct(p.cost,p.sell);
  const b=cell.querySelector(".live-margin-badge");
  const f=cell.querySelector(".margin-fill");
  if(b){b.textContent=pct(m);b.className=`badge ${bc(m)} live-margin-badge`;}
  if(f){f.style.width=`${Math.min(100,m)}%`;f.style.background=m>=40?"#A8C4B4":m>=20?"#F4C4A4":"#E8A4B0";}
}

/* ══════════════════════════════════════════════
   BUSINESS INSIGHTS
══════════════════════════════════════════════ */
function renderInsights() {
  const {sales,products}=STATE;
  const allDates=sales.map(o=>o.date).filter(Boolean).sort();
  const minDate=allDates[0]||new Date().toISOString().split("T")[0];
  const maxDate=allDates[allDates.length-1]||new Date().toISOString().split("T")[0];
  // Always sync "all" range to actual data - catches new invoices automatically
  if(!STATE.biFrom||STATE.biQuick==="all") STATE.biFrom=minDate;
  if(!STATE.biTo||STATE.biQuick==="all") STATE.biTo=maxDate;
  // For time-relative periods, keep "to" date in sync with latest data
  if(STATE.biQuick==="ytd"||STATE.biQuick==="3m"||STATE.biQuick==="month") STATE.biTo=maxDate;

  function applyQuick(p){
    STATE.biQuick=p;
    const t=new Date();
    if(p==="all"){STATE.biFrom=minDate;STATE.biTo=maxDate;}
    else if(p==="ytd"){STATE.biFrom=`${t.getFullYear()}-01-01`;STATE.biTo=maxDate;}
    else if(p==="q1"){const y=t.getFullYear();STATE.biFrom=`${y}-01-01`;STATE.biTo=`${y}-03-31`;}
    else if(p==="q2"){const y=t.getFullYear();STATE.biFrom=`${y}-04-01`;STATE.biTo=`${y}-06-30`;}
    else if(p==="q3"){const y=t.getFullYear();STATE.biFrom=`${y}-07-01`;STATE.biTo=`${y}-09-30`;}
    else if(p==="q4"){const y=t.getFullYear();STATE.biFrom=`${y}-10-01`;STATE.biTo=`${y}-12-31`;}
    else if(p==="3m"){const ago=new Date(t);ago.setMonth(ago.getMonth()-3);STATE.biFrom=ago.toISOString().split("T")[0];STATE.biTo=maxDate;}
    else if(p==="month"){STATE.biFrom=`${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,"0")}-01`;STATE.biTo=maxDate;}
    renderPage();
  }

  const allCats=["All",...[...new Set(products.map(p=>p.cat))].sort()];

  const fil=sales.filter(o=>{
    if((o.type||"invoice")==="quote") return false; // exclude quotes from business insights
    if(o.date<STATE.biFrom||o.date>STATE.biTo)return false;
    if(STATE.biPay!=="all"&&o.payment.toLowerCase()!==STATE.biPay)return false;
    if(STATE.biCat!=="All"){const has=o.items.some(i=>{const p=products.find(x=>x.name===i.product);return p&&p.cat===STATE.biCat;});if(!has)return false;}
    return true;
  });

  const rev=fil.reduce((s,o)=>s+tRev(o.items),0);
  const cost=fil.reduce((s,o)=>s+tCost(o.items,products),0);
  const profit=rev-cost,margin=rev>0?profit/rev*100:0;
  const cashRev=fil.filter(o=>o.payment==="Cash").reduce((s,o)=>s+tRev(o.items),0);
  const eftRev=fil.filter(o=>o.payment==="EFT").reduce((s,o)=>s+tRev(o.items),0);
  const avgOrder=fil.length?rev/fil.length:0;

  const getKey=date=>{const d=new Date(date);if(STATE.biGroup==="month")return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;if(STATE.biGroup==="quarter"){return`${d.getFullYear()}-Q${Math.floor(d.getMonth()/3)+1}`;}return String(d.getFullYear());};
  const getLabel=key=>{if(STATE.biGroup==="month"){const[y,m]=key.split("-");return new Date(y,m-1).toLocaleString("default",{month:"short",year:"2-digit"});}return key;};

  const byP={};
  fil.forEach(o=>{const k=getKey(o.date);if(!byP[k])byP[k]={rev:0,cost:0,count:0};byP[k].rev+=tRev(o.items);byP[k].cost+=tCost(o.items,products);byP[k].count++;});
  const periods=Object.entries(byP).sort((a,b)=>a[0].localeCompare(b[0]));
  const profitLine=periods.map(([k,d])=>({label:getLabel(k),value:d.rev-d.cost}));
  const barData=periods.map(([k,d])=>({label:getLabel(k),rev:d.rev,cost:d.cost,profit:d.rev-d.cost}));

  const byCat={};fil.forEach(o=>o.items.forEach(i=>{const p=products.find(x=>x.name===i.product);const cat=p?p.cat:"Other";byCat[cat]=(byCat[cat]||0)+i.qty*i.price;}));
  const catData=Object.entries(byCat).sort((a,b)=>b[1]-a[1]).slice(0,8).map(([label,value])=>({label,value}));
  const byCostCat={};fil.forEach(o=>o.items.forEach(i=>{const p=products.find(x=>x.name===i.product);const cat=p?p.cat:"Other";byCostCat[cat]=(byCostCat[cat]||0)+(p?p.cost*i.qty:0);}));
  const costCatData=Object.entries(byCostCat).sort((a,b)=>b[1]-a[1]).slice(0,8).map(([label,value])=>({label,value}));

  const byProd={};fil.forEach(o=>o.items.forEach(i=>{const p=products.find(x=>x.name===i.product);if(!byProd[i.product])byProd[i.product]={rev:0,cost:0,qty:0};byProd[i.product].rev+=i.qty*i.price;byProd[i.product].cost+=p?p.cost*i.qty:0;byProd[i.product].qty+=i.qty;}));
  const topProd=Object.entries(byProd).sort((a,b)=>b[1].rev-a[1].rev).slice(0,10);
  const bestP=periods.length?periods.reduce((a,b)=>b[1].rev>a[1].rev?b:a,periods[0]):null;
  const bestProfit=periods.length?periods.reduce((a,b)=>(b[1].rev-b[1].cost)>(a[1].rev-a[1].cost)?b:a,periods[0]):null;

  const content=div("content");

  // Control panel

  // Date range + group by row
  const row1=div("",el("div",{style:{display:"flex",gap:"16px",flexWrap:"wrap",alignItems:"flex-start",marginBottom:"14px"}}));
  // Date range
  const drWrap=div(""); drWrap.appendChild(div("filter-lbl","Date range"));
  const dr=div("date-range");
  dr.append(lbl("From"),(()=>{const i=inp({type:"date",value:STATE.biFrom});i.addEventListener("change",e=>{STATE.biFrom=e.target.value;STATE.biQuick="custom";renderPage();});return i;})(),el("span",{cls:"date-sep"},"→"),lbl("To"),(()=>{const i=inp({type:"date",value:STATE.biTo});i.addEventListener("change",e=>{STATE.biTo=e.target.value;STATE.biQuick="custom";renderPage();});return i;})());
  drWrap.appendChild(dr); row1.firstChild.appendChild(drWrap);
  // Group by
  const gbWrap=div(""); gbWrap.appendChild(div("filter-lbl","Group by"));
  const gbChips=div("chip-row");
  [["month","Month"],["quarter","Quarter"],["year","Year"]].forEach(([v,l])=>gbChips.appendChild(el("button",{cls:`chip${STATE.biGroup===v?" on":""}`,onclick:()=>{STATE.biGroup=v;renderPage();}},l)));
  gbWrap.appendChild(gbChips); row1.firstChild.appendChild(gbWrap);
  // Payment
  const payWrap=div(""); payWrap.appendChild(div("filter-lbl","Payment"));
  const payChips=div("chip-row");
  [["all","All"],["eft","EFT"],["cash","Cash"]].forEach(([v,l])=>payChips.appendChild(el("button",{cls:`chip${STATE.biPay===v?" on":""}`,onclick:()=>{STATE.biPay=v;renderPage();}},l)));
  payWrap.appendChild(payChips); row1.firstChild.appendChild(payWrap);
  cp.appendChild(row1);
  // Category
  const catWrap=div(""); catWrap.appendChild(div("filter-lbl","Category"));
  const catChips=div("chip-row");
  allCats.forEach(c=>catChips.appendChild(el("button",{cls:`chip${STATE.biCat===c?" on":""}`,onclick:()=>{STATE.biCat=c;renderPage();}},c)));
  catWrap.appendChild(catChips); cp.appendChild(catWrap);
  // Quick periods
  const qpWrap=div("",div("filter-lbl","Quick periods"));
  const qpChips=div("chip-row");
  [["all","All time"],["ytd","Year to date"],["q1","Q1"],["q2","Q2"],["q3","Q3"],["q4","Q4"],["3m","Last 3 months"],["month","This month"]].forEach(([v,l])=>qpChips.appendChild(el("button",{cls:`chip${STATE.biQuick===v?" on":""}`,onclick:()=>applyQuick(v)},l)));
  qpWrap.appendChild(qpChips); cp.appendChild(qpWrap);
  cp.appendChild(el("div",{style:{marginTop:"10px",fontSize:"12px",color:"var(--text3)",fontStyle:"italic"}},`Showing ${fil.length} orders · ${STATE.biFrom} → ${STATE.biTo}`));
  content.appendChild(cp);

  // KPI tiles
  const kpiGrid=div("kpi-grid");
  function kpi(cls,lbl2,val,sub){const d=div(`kpi ${cls}`);d.append(div("kpi-lbl",lbl2),div("kpi-val",val),div("kpi-sub",sub));return d;}
  kpiGrid.append(kpi("rose","Total Revenue",Rs(rev),`${fil.length} orders · avg ${Rs(avgOrder)}`),kpi("","Cost of Goods",Rs(cost),`${pct(rev>0?cost/rev*100:0)} of revenue`),kpi("sage","Gross Profit",Rs(profit),`${pct(margin)} margin`),kpi("","Payment split",rev>0?pct(eftRev/rev*100):"—",`EFT · Cash ${Rs(cashRev)}`));
  content.appendChild(kpiGrid);

  // Insight pills
  const pillRow=div("pill-row");
  if(bestP)pillRow.appendChild(div("stat-pill","✿ Best ",span("sp-val",getLabel(bestP[0])),` (${Rs(bestP[1].rev)})`));
  if(bestProfit)pillRow.appendChild(div("stat-pill","✿ Most profitable: ",span("sp-val",getLabel(bestProfit[0])),` (${Rs(bestProfit[1].rev-bestProfit[1].cost)})`));
  pillRow.appendChild(div("stat-pill","✿ Margin: ",span("sp-val",pct(margin))));
  pillRow.appendChild(div("stat-pill","✿ Orders: ",span("sp-val",String(fil.length))));
  content.appendChild(pillRow);

  // Charts row 1
  const chartRow1=div("grid grid-2");
  const c1=div("card"); c1.appendChild(div("st","✿ Profit trend")); c1.appendChild(lineChart(profitLine,"#C8B8D8")); chartRow1.appendChild(c1);
  const c2=div("card"); c2.appendChild(div("st",`✿ Revenue vs Profit by ${STATE.biGroup}`)); c2.appendChild(barChart(barData));
  const legend=div("",el("div",{style:{display:"flex",gap:"14px",marginTop:"8px",justifyContent:"center"}}));
  [["#E8A4B0","Revenue"],["#A8C4B4","Profit"]].forEach(([col,lab])=>{const s=el("span",{style:{display:"flex",alignItems:"center",gap:"5px",fontSize:"11px",color:"var(--text3)"}});const box=div(""); box.style.cssText=`width:12px;height:12px;background:${col};border-radius:3px;display:inline-block`;s.append(box,lab);legend.firstChild.appendChild(s);});
  c2.appendChild(legend); chartRow1.appendChild(c2);
  content.appendChild(chartRow1);

  // Charts row 2 (donuts)
  const chartRow2=div("grid grid-2");
  const d1=div("card"); d1.appendChild(div("st","✿ Revenue by category")); d1.appendChild(donutChart(catData)); chartRow2.appendChild(d1);
  const d2=div("card"); d2.appendChild(div("st","✿ Cost by category")); d2.appendChild(donutChart(costCatData)); chartRow2.appendChild(d2);
  content.appendChild(chartRow2);

  // Period summary table
  const tCard=div("card"); tCard.appendChild(div("st",`✿ Summary by ${STATE.biGroup}`));
  if(!periods.length){tCard.appendChild(el("p",{style:{color:"var(--text3)",fontStyle:"italic",fontSize:"13px"}},"No data for selected filters"));}
  else{
    const tw=div("tw"); const tbl=el("table");
    const thead=el("thead",{},(()=>{const tr=el("tr");["Period","Orders","Revenue","Cost","Profit","Margin"].forEach(h=>tr.appendChild(el("th",{},h)));return tr;})());

    tbl.append(thead,tbody); tw.appendChild(tbl); tCard.appendChild(tw);
  }
  content.appendChild(tCard);

  // Product table
  if(topProd.length){
    const pCard=div("card"); pCard.appendChild(div("st","✿ Product performance"));
    const tw=div("tw"); const tbl=el("table");
    const thead=el("thead",{},(()=>{const tr=el("tr");["Product","Units","Revenue","Cost","Profit","Margin"].forEach(h=>tr.appendChild(el("th",{},h)));return tr;})());
    const tbody=el("tbody");
    topProd.forEach(([name,d])=>{const p=d.rev-d.cost,mg=d.rev>0?p/d.rev*100:0;const tr=el("tr");tr.append(el("td",{},name),el("td",{},String(d.qty)),el("td",{},R2(d.rev)),el("td",{},R2(d.cost)),el("td",{style:{color:"#3A7A5A",fontWeight:"700"}},R2(p)),el("td",{},badge(bc(mg),pct(mg))));tbody.appendChild(tr);});
    tbl.append(thead,tbody); tw.appendChild(tbl); pCard.appendChild(tw); content.appendChild(pCard);

  // ── LEADS SECTION ─────────────────────────────────────────────────

  const converted=STATE.sales.filter(o=>(o.type||"invoice")==="invoice"&&o.convertedFrom);
  const convRate=allQuotes.length>0?((converted.length/allQuotes.length)*100).toFixed(0):0;
  const quoteVal=allQuotes.reduce((s,o)=>s+tRev(o.items),0);
  const bySrc={};
  STATE.sales.forEach(o=>{

    if(!bySrc[src])bySrc[src]={quotes:0,invoices:0,revenue:0};
    if(o.type==="quote")bySrc[src].quotes++;
    else{bySrc[src].invoices++;bySrc[src].revenue+=tRev(o.items);}
  });
  const srcEntries=Object.entries(bySrc).sort((a,b)=>b[1].revenue-a[1].revenue);
  const maxSrcRev=srcEntries.reduce((m,[,d])=>Math.max(m,d.revenue),1);

  const lCard=div("card"); lCard.style.marginTop="22px";
  lCard.appendChild(el("div",{cls:"st"},"✿ Leads & quote pipeline"));

  [["Total quotes",String(allQuotes.length),"created"],
   ["Converted",String(converted.length),convRate+"% conversion rate"],
   ["Open quotes",String(allQuotes.filter(o=>!o.convertedFrom).length),"pending"],
   ["Pipeline value",Rs(quoteVal),"total quoted"]

  lCard.appendChild(lKpi);

      trk.appendChild(fill);
      row2.append(lb,trk,div("bar-val",Rs(d.revenue)));

    lCard.appendChild(srcBars);

    const stw=div("tw");

    const sthd=el("thead",{},(()=>{const tr=el("tr");["Source","Quotes","Invoices","Revenue","Conv. rate"].forEach(h=>tr.appendChild(el("th",{},h)));return tr;})());

  if(openQuotes.length>0){
    lCard.appendChild(el("div",{cls:"st",style:"margin-top:18px"},"Open quotes — pending conversion"));
    const qtw=div("tw");
    const qtbl=el("table");
    const qthd=el("thead",{},(()=>{const tr=el("tr");["Quote #","Date","Customer","Value","Source","Days open"].forEach(h=>tr.appendChild(el("th",{},h)));return tr;})());
    const qtb=el("tbody");
    [...openQuotes].sort((a,b)=>a.date.localeCompare(b.date)).forEach(o=>{

        el("td",{},el("span",{cls:"badge "+urgency},days+" days"))
      );
      qtb.appendChild(tr);
    });
    qtbl.append(qthd,qtb); qtw.appendChild(qtbl); lCard.appendChild(qtw);
  }
  content.appendChild(lCard);
  return content;
}

function topbar(title, sub, actions=[]) {
  const tb=div("topbar");
  const left=div(""); left.append(el("h2",{},title));
  if(sub)left.appendChild(el("p",{},sub));
  const right=div("tba"); actions.forEach(a=>right.appendChild(a));
  tb.append(left,right); return tb;
}

function openProdModal() {
  const m=document.getElementById("prod-modal"); m.innerHTML=""; m.className="overlay open";
  const form={cat:"",name:"",cost:0,sell:0,stock:0};
  const products=STATE.products;
  const modal=div("modal");
  const mh=div("mh",el("h3",{},"Add new product"),el("button",{cls:"xbtn",onclick:()=>{m.className="overlay";}},"×"));
  let calcDiv=null;
  function updateCalc(){
    if(calcDiv)calcDiv.remove();
    const mn=mPct(form.cost,form.sell);
    if(form.sell>0){
      calcDiv=div(`mcalc ${mn>=40?"mcalc-ok":mn>=20?"mcalc-warn":"mcalc-bad"}`,`Margin: ${pct(mn)} · Markup: ${mUp(form.cost,form.sell).toFixed(0)}% · Profit/unit: ${R2(form.sell-form.cost)}`);
      mf.before(calcDiv);
    }
  }
  const g1=div("fg fg2",div("",lbl("Product name"),textInput(form.name,v=>form.name=v)),div("",lbl("Category"),(()=>{const i=textInput(form.cat,v=>form.cat=v);i.setAttribute("list","pc-list");const dl=el("datalist",{id:"pc-list"});[...new Set(products.map(p=>p.cat))].sort().forEach(c=>dl.appendChild(el("option",{value:c})));return frag(i,dl);})()));
  const g2=div("fg fg3",div("",lbl("Cost (R)"),(()=>{const i=numInput(form.cost,v=>{form.cost=v;updateCalc();},{step:"0.01"});return i;})()),div("",lbl("Sell price (R)"),(()=>{const i=numInput(form.sell,v=>{form.sell=v;updateCalc();},{step:"0.01"});return i;})()),div("",lbl("Stock qty"),numInput(form.stock,v=>form.stock=v)));
  const mf=div("mf",btn("btn-g","Cancel",()=>{m.className="overlay";}),btn("btn-p","Add product",()=>{if(!form.name.trim()){alert("Name required");return;}STATE.products.push({...form,id:Date.now()});persist(SK.p);m.className="overlay";renderPage();}));
  modal.append(mh,g1,g2,mf); m.appendChild(modal);
  m.addEventListener("click",e=>{if(e.target===m)m.className="overlay";});
}


/* ── FIREBASE AUTH ── */
const AUTH_KEY = "dpm_auth";

function LoginScreen(onSuccess) {
  const wrap = div("login-wrap");
  const card = div("login-card");

  const logo = el("img", {cls:"login-logo", src:LOGO_SRC, alt:"Daisy Printing"});
  const h1   = el("h1", {}, "Daisy Printing");
  const sub  = el("p",  {}, "Business Manager · Sign in to continue");

  // Views: "login" and "reset"
  let view = "login";
  let errorDiv = null;
  let showPw = false;

  // Email field
  const emailGrp = div("login-field");
  emailGrp.appendChild(lbl("Email"));
  const emailInput = el("input", {type:"email", placeholder:"your@email.com", autocomplete:"email"});
  emailGrp.appendChild(emailInput);

  // Password field (login only)
  const pwGrp = div("login-field");
  pwGrp.appendChild(lbl("Password"));
  const inputWrap = div("login-input-wrap");
  const pwInput = el("input", {type:"password", placeholder:"Password", autocomplete:"current-password"});
  const showBtn = el("button", {cls:"login-show"}, "Show");
  showBtn.addEventListener("click", () => {
    showPw = !showPw;
    pwInput.type = showPw ? "text" : "password";
    showBtn.textContent = showPw ? "Hide" : "Show";
  });
  inputWrap.append(pwInput, showBtn);
  pwGrp.appendChild(inputWrap);

  const actionBtn = el("button", {cls:"login-btn"}, "Sign in ✿");

  // Forgot password link
  const forgotLink = el("button", {cls:"login-show", style:"display:block;margin:6px 0 0;font-size:12px;color:var(--rose2);text-align:right;width:100%"}, "Forgot password?");
  const backLink   = el("button", {cls:"login-show", style:"display:none;margin:14px auto 0;font-size:13px;color:var(--rose2);font-weight:700;text-align:center;width:100%"}, "← Back to sign in");

  const hint = el("p", {cls:"login-hint"}, "Session stays active until you close the tab");

  function showError(msg) {
    if (errorDiv) errorDiv.remove();
    errorDiv = div("login-error", msg);
    card.insertBefore(errorDiv, emailGrp);
  }

  function showSuccess(msg) {
    if (errorDiv) errorDiv.remove();
    const box = el("div", {style:"background:var(--sage-bg);border:1px solid var(--sage);border-radius:10px;padding:14px 18px;font-size:13px;color:#2A6A4A;margin-bottom:14px;text-align:center;line-height:1.6"}, msg);
    errorDiv = box;
    card.insertBefore(errorDiv, emailGrp);
  }

  // Switch to reset view
  forgotLink.addEventListener("click", () => {
    view = "reset";
    pwGrp.style.display = "none";
    forgotLink.style.display = "none";
    backLink.style.display = "block";
    actionBtn.textContent = "Send reset email ✿";
    sub.textContent = "Enter your email and we'll send a reset link";
    if (errorDiv) errorDiv.remove();
  });

  // Switch back to login view
  backLink.addEventListener("click", () => {
    view = "login";
    pwGrp.style.display = "";
    forgotLink.style.display = "block";
    backLink.style.display = "none";
    actionBtn.textContent = "Sign in ✿";
    sub.textContent = "Business Manager · Sign in to continue";
    if (errorDiv) errorDiv.remove();
  });

  async function attempt() {
    const email = emailInput.value.trim();
    if (!email) { showError("Please enter your email address"); return; }
    actionBtn.disabled = true;
    actionBtn.textContent = view === "login" ? "Signing in..." : "Sending...";

    if (view === "reset") {
      // Password reset email
      try {
        await auth.sendPasswordResetEmail(email);
        showSuccess("Reset email sent! ✿\nCheck your inbox and follow the link to set a new password.");
        // Show back link prominently
        backLink.style.display = "block";
        backLink.style.marginTop = "8px";
        forgotLink.style.display = "none";
        actionBtn.textContent = "Send reset email ✿";
        actionBtn.disabled = false;
      } catch(e) {
        showError(e.code === "auth/user-not-found" ? "No account found with that email." : "Could not send reset email. Please try again.");
        actionBtn.textContent = "Send reset email ✿";
        actionBtn.disabled = false;
      }
    } else {
      // Sign in
      const pw = pwInput.value;
      if (!pw) { showError("Please enter your password"); actionBtn.textContent = "Sign in ✿"; actionBtn.disabled = false; return; }
      try {
        await auth.signInWithEmailAndPassword(email, pw);
        sessionStorage.setItem(AUTH_KEY, "1");
        onSuccess();
      } catch(e) {
        const msg = e.code === "auth/wrong-password" || e.code === "auth/invalid-credential"
          ? "Incorrect email or password — please try again"
          : e.code === "auth/user-not-found"
          ? "No account found with that email"
          : e.code === "auth/too-many-requests"
          ? "Too many attempts — please wait a moment and try again"
          : "Sign in failed — please try again";
        showError(msg);
        pwInput.value = "";
        pwInput.focus();
        actionBtn.textContent = "Sign in ✿";
        actionBtn.disabled = false;
      }
    }
  }

  actionBtn.addEventListener("click", attempt);
  pwInput.addEventListener("keydown", e => { if (e.key === "Enter") attempt(); });
  emailInput.addEventListener("keydown", e => { if (e.key === "Enter" && view === "reset") attempt(); });

  card.append(logo, h1, sub, emailGrp, pwGrp, actionBtn, forgotLink, backLink, hint);
  wrap.appendChild(card);
  return wrap;
}

/* ── EMAIL ── */
async function sendInvoiceEmail(inv) {
  const sub  = tRev(inv.items);
  const vat  = inv.vatIncl ? sub * 0.15 : 0;
  const tot  = sub + vat;
  const isQ  = inv.type === "quote";

  // Build items HTML rows for the template
  const itemsHtml = inv.items.map(i =>
    `<tr style="border-bottom:1px solid #EDD8E0">
      <td style="padding:9px 13px;font-size:13px;color:#3D2C35">${i.product||"—"}</td>
      <td style="padding:9px 13px;font-size:13px;color:#3D2C35;text-align:center">${i.qty}</td>
      <td style="padding:9px 13px;font-size:13px;font-weight:700;color:#3D2C35;text-align:right">R ${(i.qty*i.price).toFixed(2)}</td>
    </tr>`
  ).join("");

  const params = {
    to_email:   inv.email,
    to_name:    inv.customer || "Valued Customer",
    doc_type:   isQ ? "Quote" : "Invoice",
    order_id:   inv.orderId || "—",
    date:       inv.date || "—",
    amount:     "R " + tot.toFixed(2),
    payment:    isQ ? "Quote — Valid for 30 days" : (inv.payment || "—"),
    items_html: itemsHtml,
    message:    isQ
      ? "Please find your quote from Daisy Printing attached below. This quote is valid for 30 days. Feel free to reply to this email with any questions."
      : "Please find your invoice from Daisy Printing below. Thank you for your order!",
  };

  try {
    await emailjs.send("service_enqxkfu", "template_ll2ranr", params);
    return { ok: true };
  } catch(e) {
    console.error("EmailJS error:", e);
    return { ok: false, error: e };
  }
}

async function loadFromCloud() {
  // Show loading indicator
  const main = document.getElementById("main");
  if(main) main.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:16px;color:var(--text3)"><div style="font-size:32px">🌸</div><div style="font-size:14px;font-weight:700;letter-spacing:.5px">Loading your data...</div></div>';
  
  const data = await cloudLoad();
  if(data) {
    if(data.products && data.products.length) STATE.products = data.products;
    if(data.sales    && data.sales.length)    STATE.sales    = data.sales;
    if(data.inventory && data.inventory.length) STATE.inventory = data.inventory;
  }
  renderSidebar();
  renderPage();
}

function render() {
  // Check Firebase auth state first
  auth.onAuthStateChanged(user => {
    if (user) {
      // User is signed in
      sessionStorage.setItem(AUTH_KEY, "1");
      const existing = document.querySelector(".login-wrap");
      if (existing) existing.remove();
      document.getElementById("app").style.display = "flex";
      loadFromCloud();
    } else if (sessionStorage.getItem(AUTH_KEY) !== "1") {
      // Not signed in - show login
      document.getElementById("app").style.display = "none";
      const loginEl = LoginScreen(() => {
        loginEl.remove();
        document.getElementById("app").style.display = "flex";
        loadFromCloud();
      });
      document.body.appendChild(loginEl);
    }
  });
}

function refreshDashboard() {
  // Re-render just the dashboard metrics if dashboard is active
  if(STATE.page === "dashboard") renderPage();
}
render();
